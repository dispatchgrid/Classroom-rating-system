<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            background-color: #ffffff;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="login-container">
            <h2 class="text-center mb-4">CRS Admin Login</h2>
          
                <div class="mb-3">
                    <label for="email" class="form-label">Username</label>
                    <input type="name" class="form-control" id="email" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Password"  autocomplete="off" required>
                </div>
                <div class="d-grid">
                    <button onclick="login();" class="btn btn-primary btn-block">Login</button>
                </div>
            <div class="mt-3 text-center">

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function login(){
        if(document.getElementById("email").value == "admin"){
            if(document.getElementById("password").value == "123"){
                alert("success");
              window.location = "adminDashboard.html";
              window.location = "adminDashboard.html";

            }else{
                alert("Invalid password");
            }
        }else{
            alert("Invalid username");
        }
    }
    </script>
</body>

</html>
