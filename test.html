        async function fetchAttendanceData() {
            const response = await fetch('https://teacher-rating-system.glitch.me/api/sql?queries=SELECT * FROM Teachers');
            const data = await response.json();
            return data.results[0].result;
        }

        async function fetchClassData() {

        function fillAttendanceTable(subjectData) {
            const attendanceTableBody = document.querySelector('#attendance-table tbody');
            const totalCounts = {

                absent: 0,
                relief: 0,
                totalPeriods: 0
            };

            subjectData.forEach(subject => {
                const { Subject, Present, Absent, Relief, TotalPeriods } = subject;

                const presentPercent = ((Present / TotalPeriods) * 100).toFixed(2);
                const absentPercent = ((Absent / TotalPeriods) * 100).toFixed(2);
                const reliefPercent = ((Relief / TotalPeriods) * 100).toFixed(2);

                // Append a new row for each subject
                const row = document.createElement('tr');
                row.innerHTML = `
            <td>${Subject}</td>
            <td>${TotalPeriods}</td>
            <td>${Present}</td>
            <td>${presentPercent}%</td>
            <td>${Absent}</td>
            <td>${absentPercent}%</td>
            <td>${Relief}</td>
            <td>${reliefPercent}%</td>
        `;
                attendanceTableBody.appendChild(row);

                // Update total counts
                totalCounts.present += Present;
                totalCounts.absent += Absent;
                totalCounts.relief += Relief;
                totalCounts.totalPeriods += TotalPeriods;
            });

            // Calculate total percentages for the footer
            const totalPresentPercent = ((totalCounts.present / totalCounts.totalPeriods) * 100).toFixed(2);
            const totalAbsentPercent = ((totalCounts.absent / totalCounts.totalPeriods) * 100).toFixed(2);
            const totalReliefPercent = ((totalCounts.relief / totalCounts.totalPeriods) * 100).toFixed(2);

            // Fill footer with total counts and percentages
            document.getElementById('total-present-n').innerText = totalCounts.present;
            document.getElementById('total-present-percent').innerText = totalPresentPercent + '%';
            document.getElementById('total-absent-n').innerText = totalCounts.absent;
            document.getElementById('total-absent-percent').innerText = totalAbsentPercent + '%';
            document.getElementById('total-relief-n').innerText = totalCounts.relief;
            document.getElementById('total-relief-percent').innerText = totalReliefPercent + '%';
        }

        function fillAttendanceTable(subjectData) {
            const attendanceTableBody = document.querySelector('#attendance-table tbody');
            const totalCounts = {
                present: 0,
                absent: 0,
                relief: 0,
                totalPeriods: 0
            };

            subjectData.forEach(subject => {
                const { Subject, Present, Absent, Relief, TotalPeriods } = subject;

                const presentPercent = ((Present / TotalPeriods) * 100).toFixed(0);
                const absentPercent = ((Absent / TotalPeriods) * 100).toFixed(0);
                const reliefPercent = ((Relief / TotalPeriods) * 100).toFixed(0);

                // Append a new row for each subject
                const row = document.createElement('tr');
                row.innerHTML = `
            <td>${Subject}</td>
            <td>${TotalPeriods}</td>
            <td>${Present}</td>
            <td>${presentPercent}%</td>
            <td>${Absent}</td>
            <td>${absentPercent}%</td>
            <td>${Relief}</td>
            <td>${reliefPercent}%</td>
        `;
                attendanceTableBody.appendChild(row);

                // Update total counts
                totalCounts.present += Present;
                totalCounts.absent += Absent;
                totalCounts.relief += Relief;
                totalCounts.totalPeriods += TotalPeriods;
            });

            // Calculate total percentages for the footer
            const totalPresentPercent = ((totalCounts.present / totalCounts.totalPeriods) * 100).toFixed(2);
            const totalAbsentPercent = ((totalCounts.absent / totalCounts.totalPeriods) * 100).toFixed(2);

            document.getElementById('total-relief-percent').innerText = totalReliefPercent + '%';
            document.getElementById('total-count-n').innerText = totalCounts.totalPeriods;
        
        }

        function aggregateSubjectAttendance(attendanceData) {
            const subjectSummary = {};

            attendanceData.forEach(entry => {
                const { Subject, Type } = entry;

                if (!subjectSummary[Subject]) {
                    subjectSummary[Subject] = {
                        Relief: 0,
                        Present: 0,
                        Absent: 0,
                        TotalPeriods: 0
                    };
                }

                if (Type === 0) {
                    subjectSummary[Subject].Absent++;
                } else if (Type === 1) {
                    subjectSummary[Subject].Present++;
                } else if (Type === 2) {
                    subjectSummary[Subject].Relief++;
                }

                subjectSummary[Subject].TotalPeriods++;
            });

            return Object.entries(subjectSummary).map(([subject, counts]) => ({
                Subject: subject,
                ...counts
            }));
        }
        function getAttendanceTypeByHighestCount(attendanceData) {
            const attendanceCount = {};

            attendanceData.forEach(entry => {
                const { Date, period, Subject, Attendance } = entry;

                if (!attendanceCount[Subject]) {
                    attendanceCount[Subject] = {};
                }

                if (!attendanceCount[Subject][Date]) {
                    attendanceCount[Subject][Date] = {};
                }

                if (!attendanceCount[Subject][Date][period]) {
                    attendanceCount[Subject][Date][period] = {
                        Present: 0,
                        Absent: 0,
                        Relief: 0
                    };
                }

                if (Attendance === 1) {
                    attendanceCount[Subject][Date][period].Present++;
                } else if (Attendance === 0) {
                    attendanceCount[Subject][Date][period].Absent++;
                } else if (Attendance === 2) {
                    attendanceCount[Subject][Date][period].Relief++;
                }
            });

            const result = [];

            for (const subject in attendanceCount) {
                for (const date in attendanceCount[subject]) {
                    for (const period in attendanceCount[subject][date]) {
                        const counts = attendanceCount[subject][date][period];
                        const maxCount = Math.max(counts.Present, counts.Absent, counts.Relief);

                        let type = null;
                        if (maxCount === counts.Present) {
                            type = 1; // Present
                        } else if (maxCount === counts.Absent) {
                            type = 0; // Absent
                        } else if (maxCount === counts.Relief) {
                            type = 2; // Relief
                        }

                        result.push({
                            Date: date,
                            Period: parseInt(period), // Ensure period is treated as an integer
                            Subject: subject,
                            Present: counts.Present,
                            Absent: counts.Absent,
                            Relief: counts.Relief,
                            Type: type
                        });
                    }
                }
            }

            return result;
        }


        function getAttendanceCountByModeAndSubject(attendanceData) {
            const attendanceCount = {};

            attendanceData.forEach(entry => {
                const { Date, period, Subject, Attendance } = entry;

                if (!attendanceCount[Subject]) {
                    attendanceCount[Subject] = {};
                }

                if (!attendanceCount[Subject][Date]) {
                    attendanceCount[Subject][Date] = {};
                }

                if (!attendanceCount[Subject][Date][period]) {
                    attendanceCount[Subject][Date][period] = [];
                }

                attendanceCount[Subject][Date][period].push(Attendance);
            });

            const result = [];

            for (const subject in attendanceCount) {
                for (const date in attendanceCount[subject]) {
                    for (const period in attendanceCount[subject][date]) {
                        const attendances = attendanceCount[subject][date][period];

                        const mode = attendances.sort((a, b) =>
                            attendances.filter(v => v === a).length - attendances.filter(v => v === b).length
                        ).pop();

                        result.push({
                            Date: date,
                            Period: parseInt(period),
                            Subject: subject,
                            Present: mode === 1 ? attendances.filter(a => a === 1).length : 0,
                            Absent: mode === 0 ? attendances.filter(a => a === 0).length : 0,
                            Relief: mode === 2 ? attendances.filter(a => a === 2).length : 0
                        });
                    }
                }
            }

            return result;
        }



        function getUniqueTeacherNames(data) {
            return [...new Set(data.map(item => item.Name))];
        }
        function getSubjectsForTeacher(timetable, teacherName) {
            return [...new Set(
                timetable
                    .filter(item => item.Teachername === teacherName)
                    .map(item => item.Subject)
            )];
        }
        function getAttendanceForSubject(attendanceData, subject) {
            return attendanceData.filter(item => item.Subject === subject);
        }
        function addSubjectToAttendance(attendanceData, classData) {
            return attendanceData.map(entry => {
                const date = new Date(entry.Date);
                const day = date.toLocaleDateString('en-US', { weekday: 'long' });

                const subjectEntry = classData.find(
                    item => item.Period === entry.period && item.Date === day && item.Teachername === entry.Name
                );

                return { ...entry, Subject: subjectEntry ? subjectEntry.Subject : null };
            });
        }
