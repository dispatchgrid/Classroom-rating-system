<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Trouble Makers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h2 class="text-center mt-5">Top 5 Trouble Makers</h2>

        <!-- Input for class name -->
        <div class="mb-3">
            <label for="classNameInput" class="form-label">Enter Class Name:</label>
            <input type="text" class="form-control" id="classNameInput" placeholder="e.g., 9C">
            <button class="btn btn-primary mt-2" onclick="fetchAndDisplayTroublemakers()">Fetch Trouble Makers</button>
        </div>

        <!-- Text Area for displaying trouble makers -->
        <div class="mb-3">
            <label for="resultTextArea" class="form-label">Top 5 Trouble Makers:</label>
            <textarea class="form-control" id="resultTextArea" rows="10" readonly></textarea>
        </div>
    </div>

    <script>
        // Helper function to get top 5 troublemakers
        function getTopTroublemakers(data) {
            const counts = {};

            // Helper function to increment the count for each student, ignoring case and spaces
            function incrementCount(category) {
                category.forEach(name => {
                    // Normalize name (convert to lowercase and trim spaces)
                    const normalized = name.toLowerCase().trim();

                    // Ignore empty names
                    if (normalized) {
                        if (normalized in counts) {
                            counts[normalized]++;
                        } else {
                            counts[normalized] = 1;
                        }
                    }
                });
            }

            // Process each category of troublemakers
            incrementCount(data["Silence breakers"]);
            incrementCount(data["Unobedient"]);
            incrementCount(data["Attention breakers"]);
            incrementCount(data["Not present"]);

            // Convert counts to an array and sort by the number of occurrences
            const sortedTroublemakers = Object.entries(counts)
                .sort((a, b) => b[1] - a[1]) // Sort in descending order based on count
                .slice(0, 5); // Get the top 5 troublemakers

            return sortedTroublemakers.map(([name, count]) => `${name}: ${count} incidents`);
        }

        // Fetch data from API and display top 5 troublemakers
        async function fetchAndDisplayTroublemakers() {
            const className = document.getElementById('classNameInput').value.trim();
            if (!className) {
                alert('Please enter a class name.');
                return;
            }

            const apiUrl = `https://legendary-sneaky-inch.glitch.me/api/sql?queries=Select * from classes WHERE name='${className}' AND Date >= date('now', '-30 days')`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const results = data.results[0].result;

                const troublemakers = {
                    "Silence breakers": [],
                    "Unobedient": [],
                    "Attention breakers": [],
                    "Not present": []
                };

                results.forEach(row => {
                    if (row.Silence_com) {
                        troublemakers["Silence breakers"].push(...row.Silence_com.split('\n').map(name => name.trim()));
                    }
                    if (row.Homework_com) {
                        troublemakers["Unobedient"].push(...row.Homework_com.split('\n').map(name => name.trim()));
                    }
                    if (row.Notes_com) {
                        troublemakers["Attention breakers"].push(...row.Notes_com.split('\n').map(name => name.trim()));
                    }
                    if (row.Attendance_com) {
                        troublemakers["Not present"].push(...row.Attendance_com.split('\n').map(name => name.trim()));
                    }
                });

                // Get the top 5 troublemakers
                const topTroublemakers = getTopTroublemakers(troublemakers);

                // Display the result in the text area
                document.getElementById('resultTextArea').value = topTroublemakers.join('\n');
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('resultTextArea').value = 'An error occurred while fetching data.';
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
