<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics and Top Trouble Makers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        .chart-container {
            margin-top: 50px;
            height: 400px; /* Adjust the height as needed */
        }
        canvas {
            width: 100% !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Input for class name -->
        <br>
        <br>
        <h1 style="text-align: center; width:100%;">Class summary for last 30 days</h1>
        <br>
        <div class="mb-3 mt-5">
            <label for="classNameInput" class="form-label">Enter Class Name:</label>
            <input type="text" class="form-control" id="classNameInput" placeholder="e.g., 9C">
            <button class="btn btn-primary mt-2" onclick="fetchDataAndDisplayTroublemakers()">Fetch Data</button>
        </div>

        <!-- Multi-Bar Chart -->
        <div class="chart-container">
            <canvas id="barChart"></canvas>
        </div>

        <!-- Line Chart -->
        <div class="chart-container mt-5">
            <canvas id="lineChart"></canvas>
        </div>

        <!-- Text Area for displaying trouble makers -->
        <div class="mb-3 mt-5">
           <h2>Top 5 Trouble Makers:</h2>
            <textarea class="form-control" id="resultTextArea" rows="10" readonly></textarea>
        </div>
    </div>

    <script>
        const ctxBar = document.getElementById('barChart').getContext('2d');
        const barChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Silence',
                        data: [],
                        backgroundColor: 'rgba(255, 99, 132, 0.6)',
                        borderColor: 'rgba(255, 99, 132, 1)',
                        borderWidth: 1,
                        barThickness: 20
                    },
                    {
                        label: 'Obedience',
                        data: [],
                        backgroundColor: 'rgba(54, 162, 235, 0.6)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1,
                        barThickness: 20
                    },
                    {
                        label: 'Attention',
                        data: [],
                        backgroundColor: 'rgba(75, 192, 192, 0.6)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1,
                        barThickness: 20
                    },
                    {
                        label: 'Presence',
                        data: [],
                        backgroundColor: 'rgba(153, 102, 255, 0.6)',
                        borderColor: 'rgba(153, 102, 255, 1)',
                        borderWidth: 1,
                        barThickness: 20
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Period',
                            font: {
                                size: 14
                            }
                        },
                        barPercentage: 0.8,
                        categoryPercentage: 0.9
                    },
                    y: {
                        min: 0,
                        ticks: {
                            stepSize: 1,
                            callback: function(value) {
                                return Number.isInteger(value) ? value : null;
                            },
                            font: {
                                size: 14
                            }
                        },
                        title: {
                            display: true,
                            text: 'Stars',
                            font: {
                                size: 14
                            }
                        }
                    }
                },
                layout: {
                    padding: {
                        top: 10,
                        bottom: 10
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            font: {
                                size: 14
                            }
                        }
                    }
                }
            }
        });

        const ctxLine = document.getElementById('lineChart').getContext('2d');
        const lineChart = new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Total Stars',
                        data: [],
                        borderColor: 'rgba(255, 159, 64, 1)',
                        borderWidth: 2,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Date',
                            font: {
                                size: 14
                            }
                        }
                    },
                    y: {
                        min: 0,
                        ticks: {
                            stepSize: 1,
                            callback: function(value) {
                                return Number.isInteger(value) ? value : null;
                            },
                            font: {
                                size: 14
                            }
                        },
                        title: {
                            display: true,
                            text: 'Total Stars',
                            font: {
                                size: 14
                            }
                        }
                    }
                },
                layout: {
                    padding: {
                        top: 10,
                        bottom: 10
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            font: {
                                size: 14
                            }
                        }
                    }
                }
            }
        });

        // Helper function to get top 5 troublemakers
        function getTopTroublemakers(data) {
            const counts = {};

            function incrementCount(category) {
                category.forEach(name => {
                    const normalized = name.toLowerCase().trim();
                    if (normalized) {
                        counts[normalized] = (counts[normalized] || 0) + 1;
                    }
                });
            }

            incrementCount(data["Silence breakers"]);
            incrementCount(data["Unobedient"]);
            incrementCount(data["Attention breakers"]);
            incrementCount(data["Not present"]);

            const sortedTroublemakers = Object.entries(counts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            return sortedTroublemakers.map(([name, count]) => `${name}: ${count} incidents`);
        }

        async function fetchDataAndDisplayTroublemakers() {
            const className = document.getElementById('classNameInput').value.trim();
            if (!className) {
                alert('Please enter a class name.');
                return;
            }

            const apiUrl = `https://legendary-sneaky-inch.glitch.me/api/sql?queries=Select * from classes WHERE name='${className}' AND Date >= date('now', '-30 days')`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const results = data.results[0].result;

                const troublemakers = {
                    "Silence breakers": [],
                    "Unobedient": [],
                    "Attention breakers": [],
                    "Not present": []
                };

                const periods = [1, 2, 3, 4, 5, 6, 7, 8];
                const plotData = {
                    'Silence': new Array(periods.length).fill(0),
                    'Obedience': new Array(periods.length).fill(0),
                    'Attention': new Array(periods.length).fill(0),
                    'Presence': new Array(periods.length).fill(0)
                };

                const dailyTotal = {};
                const dates = [];

                results.forEach(row => {
                    const index = periods.indexOf(row.period);
                    if (index !== -1) {
                        plotData['Silence'][index] += row.Silence || 0;
                        plotData['Obedience'][index] += row.Homework || 0;
                        plotData['Attention'][index] += row.Notes || 0;
                        plotData['Presence'][index] += row.Attendance || 0;

                        if (row.Silence_com) troublemakers["Silence breakers"].push(...row.Silence_com.split('\n').map(name => name.trim()));
                        if (row.Homework_com) troublemakers["Unobedient"].push(...row.Homework_com.split('\n').map(name => name.trim()));
                        if (row.Notes_com) troublemakers["Attention breakers"].push(...row.Notes_com.split('\n').map(name => name.trim()));
                        if (row.Attendance_com) troublemakers["Not present"].push(...row.Attendance_com.split('\n').map(name => name.trim()));

                        const date = row.Date;
                        if (!dailyTotal[date]) {
                            dailyTotal[date] = 0;
                            dates.push(date);
                        }
                        dailyTotal[date] += row.Silence + row.Homework + row.Notes + row.Attendance;
                    }
                });

                const filteredDates = dates.filter(date => new Date(date) >= new Date(new Date().setDate(new Date().getDate() - 30)));

                barChart.data.labels = periods;
                barChart.data.datasets.forEach((dataset) => {
                    dataset.data = plotData[dataset.label];
                });
                barChart.update();

                lineChart.data.labels = filteredDates;
                lineChart.data.datasets[0].data = filteredDates.map(date => dailyTotal[date]);
                lineChart.update();

                const topTroublemakers = getTopTroublemakers(troublemakers);
                document.getElementById('resultTextArea').value = topTroublemakers.join('\n');
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
    </script>

</body>
</html>
