<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics Page - Multi Bar Chart and Line Chart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        .chart-container {
            margin-top: 50px;
            height: 400px; /* Adjust the height as needed */
        }
        canvas {
            width: 100% !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="text-center mt-5">Statistics: Period vs Stars (Multi-Bar Chart)</h2>

        <!-- Input for class name -->
        <div class="mb-3">
            <label for="classNameInput" class="form-label">Enter Class Name:</label>
            <input type="text" class="form-control" id="classNameInput" placeholder="e.g., 9C">
            <button class="btn btn-primary mt-2" onclick="fetchData()">Fetch Data</button>
        </div>

        <!-- Multi-Bar Chart -->
        <div class="chart-container">
            <canvas id="barChart"></canvas>
        </div>

        <!-- Line Chart -->
        <div class="chart-container mt-5">
            <canvas id="lineChart"></canvas>
        </div>
    </div>

    <script>
        const ctxBar = document.getElementById('barChart').getContext('2d');
        const barChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: [], // Labels will be set dynamically
                datasets: [
                    {
                        label: 'Plot 1',
                        data: [], // Data for Plot 1
                        backgroundColor: 'rgba(255, 99, 132, 0.6)',
                        borderColor: 'rgba(255, 99, 132, 1)',
                        borderWidth: 1,
                        barThickness: 20
                    },
                    {
                        label: 'Plot 2',
                        data: [], // Data for Plot 2
                        backgroundColor: 'rgba(54, 162, 235, 0.6)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1,
                        barThickness: 20
                    },
                    {
                        label: 'Plot 3',
                        data: [], // Data for Plot 3
                        backgroundColor: 'rgba(75, 192, 192, 0.6)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1,
                        barThickness: 20
                    },
                    {
                        label: 'Plot 4',
                        data: [], // Data for Plot 4
                        backgroundColor: 'rgba(153, 102, 255, 0.6)',
                        borderColor: 'rgba(153, 102, 255, 1)',
                        borderWidth: 1,
                        barThickness: 20
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Period',
                            font: {
                                size: 14
                            }
                        },
                        barPercentage: 0.8,
                        categoryPercentage: 0.9
                    },
                    y: {
                        min: 0,
                        ticks: {
                            stepSize: 1,
                            callback: function(value) {
                                return Number.isInteger(value) ? value : null;
                            },
                            font: {
                                size: 14
                            }
                        },
                        title: {
                            display: true,
                            text: 'Stars',
                            font: {
                                size: 14
                            }
                        }
                    }
                },
                layout: {
                    padding: {
                        top: 10,
                        bottom: 10
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            font: {
                                size: 14
                            }
                        }
                    }
                }
            }
        });

        const ctxLine = document.getElementById('lineChart').getContext('2d');
        const lineChart = new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: [], // Dates will be set dynamically
                datasets: [
                    {
                        label: 'Total Stars',
                        data: [], // Total stars per day
                   
                        borderColor: 'rgba(255, 159, 64, 1)',
                        borderWidth: 2,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Date',
                            font: {
                                size: 14
                            }
                        }
                       
                    },
                    y: {
                        min: 0,
                        ticks: {
                            stepSize: 1,
                            callback: function(value) {
                                return Number.isInteger(value) ? value : null;
                            },
                            font: {
                                size: 14
                            }
                        },
                        title: {
                            display: true,
                            text: 'Total Stars',
                            font: {
                                size: 14
                            }
                        }
                    }
                },
                layout: {
                    padding: {
                        top: 10,
                        bottom: 10
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            font: {
                                size: 14
                            }
                        }
                    }
                }
            }
        });

        function fetchData() {
    const className = document.getElementById('classNameInput').value.trim();
    if (!className) {
        alert('Please enter a class name.');
        return;
    }

    const apiUrl = `https://legendary-sneaky-inch.glitch.me/api/sql?queries=Select * from classes WHERE name='${className}' AND Date >= date('now', '-30 days')`;

    fetch(apiUrl)
        .then(response => response.json())
        .then(data => {
            const results = data.results[0].result;

            // Prepare data for the multi-bar chart
            const periods = [1, 2, 3, 4, 5, 6, 7, 8];
            const plotData = {
                'Plot 1': new Array(periods.length).fill(0),
                'Plot 2': new Array(periods.length).fill(0),
                'Plot 3': new Array(periods.length).fill(0),
                'Plot 4': new Array(periods.length).fill(0),
            };

            // Prepare data for the line chart
            const dailyTotal = {};
            const dates = [];

            // Aggregate data for each period and daily totals
            results.forEach(row => {
                const index = periods.indexOf(row.period);
                if (index !== -1) {
                    plotData['Plot 1'][index] += row.Silence || 0;
                    plotData['Plot 2'][index] += row.Homework || 0;
                    plotData['Plot 3'][index] += row.Notes || 0;
                    plotData['Plot 4'][index] += row.Attendance || 0;

                    // Aggregate daily totals
                    const date = row.Date;
                    if (!dailyTotal[date]) {
                        dailyTotal[date] = 0;
                        dates.push(date);
                    }
                    dailyTotal[date] += row.Silence + row.Homework + row.Notes + row.Attendance;
                }
            });

            // Filter dates to include only the last 30 days
            const today = new Date();
            const thirtyDaysAgo = new Date(today.setDate(today.getDate() - 30));

            // Only keep dates within the last 30 days
            const filteredDates = dates.filter(date => new Date(date) >= thirtyDaysAgo);

            // Prepare line chart data for the last 30 days
            const lineChartData = filteredDates.map(date => dailyTotal[date]);
            console.log(lineChartData);
            console.log(plotData['Plot 4']);
            // Update multi-bar chart
            barChart.data.labels = periods;
            barChart.data.datasets[0].data = plotData['Plot 1'];
            barChart.data.datasets[1].data = plotData['Plot 2'];
            barChart.data.datasets[2].data = plotData['Plot 3'];
            barChart.data.datasets[3].data = plotData['Plot 4'];
            barChart.options.scales.y.max = Math.ceil(Math.max(...Object.values(plotData).flat()) / 5) * 5;
            barChart.update();

            // Update line chart
            lineChart.data.labels = filteredDates;
            lineChart.data.datasets[0].data = lineChartData;
            lineChart.options.scales.y.max = Math.ceil(Math.max(lineChartData) / 5) * 5;
            lineChart.update();
        })
        .catch(error => {
            console.error('Error fetching data:', error);
        });
}

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
