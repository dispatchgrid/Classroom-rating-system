<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Warning</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8d7da;
        }
        .warning-message {
            text-align: center;
            color: red;
            font-size: 48px;
        }
        .warning-icon {
            font-size: 100px;
            display: block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="warning-message">
        <div class="warning-icon">⚠️</div>
        The form is locked for today
    </div>
</body>
</html>
