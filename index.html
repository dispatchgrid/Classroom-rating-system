<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Select Class</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .class-button {
            width: 200px; /* Set a fixed width for the buttons */
            margin: 10px auto; /* Center the buttons with auto margins */
            font-size: 24px;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column; /* Stack the items vertically */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Select Class</h1>
        <button class="btn btn-primary class-button" onclick="selectClass('9A')">9A</button>
        <button class="btn btn-primary class-button" onclick="selectClass('9B')">9B</button>
        <button class="btn btn-primary class-button" onclick="selectClass('9C')">9C</button>
        <button class="btn btn-primary class-button" onclick="selectClass('9D')">9D</button>
        <button class="btn btn-primary class-button" onclick="selectClass('9E')">9E</button>
    </div>

    <script>
        const storedClass = localStorage.getItem('selectedClass');
        if (storedClass) {
            window.location.href = `rate.html?class=${storedClass}`;
        }

        function selectClass(className) {
            localStorage.setItem('selectedClass', className);
            window.location.href = `rate.html?class=${className}`; // Redirect with URL param
        }
    </script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
