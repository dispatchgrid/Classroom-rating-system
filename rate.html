<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Rate</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-group-toggle .btn.active {
            color: white;
            background-color: #28a745;
        }

        .btn-group-toggle .btn:not(.active) {
            background-color: transparent;
        }

        .btn-group-toggle .btn-outline-danger.active {
            color: white;
            background-color: #dc3545;
        }

        .btn-group-toggle .btn-outline-warning.active {
            color: white;
            background-color: #ffc107;
        }
    </style>
</head>

<body>
<div class="container mt-5">
    <div class="text-center">
        <h1>Rate</h1>
        <h3 class="mt-3" id="teacher-name">Teacher's Name</h3>
        <h5 class="mt-2" id="teacher-subject">Subject</h5>
    </div>

    <!-- Attendance Section -->
    <div class="form-group">
        <label>Attendance</label>
        <div class="btn-group btn-group-toggle d-flex" data-toggle="buttons">
            <label class="btn btn-outline-success flex-fill">
                <input type="radio" name="attendance" value="Present" onclick="toggleQuestions(true)" required>
                Present
            </label>
            <label class="btn btn-outline-warning flex-fill">
                <input type="radio" name="attendance" value="Relief" onclick="toggleQuestions(false)"> Relief
            </label>
            <label class="btn btn-outline-danger flex-fill">
                <input type="radio" name="attendance" value="Absent" onclick="toggleQuestions(false)"> Absent
            </label>

        </div>
    </div>

    <form id="ratingForm" class="mt-4">
        <fieldset id="questions-fieldset" disabled>
            <div class="form-group">
                <label>Was the teacher punctual?</label>
                <div class="btn-group btn-group-toggle d-flex" data-toggle="buttons">
                    <label class="btn btn-outline-success flex-fill">
                        <input type="radio" name="question1" value="Satisfactory" required> Satisfactory
                    </label>
                    <label class="btn btn-outline-danger flex-fill">
                        <input type="radio" name="question1" value="Not Satisfactory"> Not Satisfactory
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Was the teacher distracted by personal work?</label>
                <div class="btn-group btn-group-toggle d-flex" data-toggle="buttons">
                    <label class="btn btn-outline-success flex-fill">
                        <input type="radio" name="question2" value="Satisfactory" required> Satisfactory
                    </label>
                    <label class="btn btn-outline-danger flex-fill">
                        <input type="radio" name="question2" value="Not Satisfactory"> Not Satisfactory
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Did you understand the concepts clearly?</label>
                <div class="btn-group btn-group-toggle d-flex" data-toggle="buttons">
                    <label class="btn btn-outline-success flex-fill">
                        <input type="radio" name="question3" value="Satisfactory" required> Satisfactory
                    </label>
                    <label class="btn btn-outline-danger flex-fill">
                        <input type="radio" name="question3" value="Not Satisfactory"> Not Satisfactory
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Did the teacher solve your doubts well?</label>
                <div class="btn-group btn-group-toggle d-flex" data-toggle="buttons">
                    <label class="btn btn-outline-success flex-fill">
                        <input type="radio" name="question4" value="Satisfactory" required> Satisfactory
                    </label>
                    <label class="btn btn-outline-danger flex-fill">
                        <input type="radio" name="question4" value="Not Satisfactory"> Not Satisfactory
                    </label>
                </div>
            </div>
        </fieldset>

        <div class="text-center">
            <button type="button" class="btn btn-primary mt-4" onclick="submitAnswers()">Submit</button>
            <button type="button" class="btn btn-secondary mt-4" onclick="skipTeacher()">Skip</button>
        </div>
    </form>
    <br>
    <br>
    <br>
    <br>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="universal.js"></script>
<script>

    var periodNumber;
    var teacherUID;
    const urlParams = new URLSearchParams(window.location.search);
    const classParam = urlParams.get('class');
    var className = classParam;

    async function fetchData() {
        addLoader();

        removeLoader();

        teacherUID = prompt("Enter teacher UID");
        periodNumber = prompt("Enter period");
        document.getElementById('teacher-name').innerText = teacherUID;


    }


    async function submitAnswers() {
        const form = document.getElementById('ratingForm');
        const attendance = document.querySelector('input[name="attendance"]:checked').value;
        let answers = [null, null, null, null];

        if (attendance === "Present") {
            answers = [
                form.question1.value,
                form.question2.value,
                form.question3.value,
                form.question4.value,
            ];
        }

        var counts = [0, 0, 0, 0];
        var updatedCounts = counts.map((count, index) => {
            return answers[index] === "Satisfactory" ? count + 1 : count - 1;
        });

        const attendanceValue = attendance === "Present" ? 1 : attendance === "Absent" ? 0 : 2;
        if (attendanceValue === 0 || attendanceValue === 2) {
            updatedCounts = [0, 0, 0, 0];
        }

        updateTeacherCounts(updatedCounts, attendanceValue);
    }

    async function updateTeacherCounts(updatedCounts, attendanceValue) {
        const date = new Date().toISOString().split('T')[0];
        const teacherName = document.getElementById('teacher-name').innerText;
        addLoader();
        const query = `INSERT INTO Teachers(name, C1, C2, C3, C4, Attendance, Date, Period)
                       VALUES ('${teacherUID}', ${updatedCounts[0]}, ${updatedCounts[1]}, ${updatedCounts[2]},
                               ${updatedCounts[3]}, ${attendanceValue}, '${date}', ${periodNumber})`;
        const response = await fetch(`https://teacher-rating-system.glitch.me/api/sql?queries=${encodeURIComponent(query)}`);
        removeLoader();
        if (!response.ok) {
            console.error("Error updating teacher counts");
        } else {
            setTimeout(() => reloadPage(currentIndex + 1), 2000);
            save();
        }
    }

    function skipTeacher() {
        reloadPage(currentIndex + 1);
    }

    function reloadPage(index) {
        window.location.href = `?index=${index}`;
    }

    fetchData();

    function save() {
        const today = new Date();
        localStorage.setItem('savedDate', today.toISOString());
        console.log('Today\'s date saved:', today.toISOString());
    }

    function toggleQuestions(enabled) {
        for (var q = 1; q < 5; q++) {
            document.getElementsByName('question' + q)[0].disabled = !enabled;
            document.getElementsByName('question' + q)[1].disabled = !enabled;
        }

        document.getElementById("questions-fieldset").style.visibility = enabled ? 'visible' : 'hidden';
    }
</script>
</body>

</html>
